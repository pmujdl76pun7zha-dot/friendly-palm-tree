<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>遊戲福利中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#d9e2ef;font-family:sans-serif}
.container{max-width:1100px;margin:20px auto;background:#f5f7fb;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.banner{position:relative;height:340px;background:#0c1b3d url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200') center/cover;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff}
.banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom, rgba(12,27,61,.1), rgba(12,27,61,.7))}
.banner-content{position:relative;z-index:2}
.banner-content h1{font-size:48px;font-weight:900;margin:10px 0;text-shadow:0 4px 15px #000}
.wrap{padding:20px}
.head{display:flex;justify-content:space-between;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:16px;overflow:hidden;text-decoration:none;color:#111;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:.2s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.card p{padding:10px 12px;font-size:14px;font-weight:600;margin:0}
</style>
</head>
<body>
<div class="container">
  <div class="banner"><div class="banner-content"><h4>✦ 最新福利活動 · 免費領取 ✦</h4><h1>遊戲福利中心</h1></div></div>
  <div class="wrap">
    <div class="head"><b>🔥 熱門遊戲福利</b><span style="font-size:12px;color:#888">點擊圖片即可前往領取</span></div>
    <div class="grid">
      <a class="card" href="https://lin.ee/YtPRppH" target="_blank"><img src="https://picsum.photos/seed/roblox_final/400/500"><p>ROBLOX</p></a>
      <a class="card" href="https://lin.ee/5iNywDE" target="_blank"><img src="https://picsum.photos/seed/valorant_final/400/500"><p>特戰英豪</p></a>
      <a class="card" href="https://lin.ee/UYjQGxW" target="_blank"><img src="https://picsum.photos/seed/aov_final/400/500"><p>傳說對決</p></a>
      <a class="card" href="https://lin.ee/PJFWNwU" target="_blank"><img src="https://picsum.photos/seed/brawl_final/400/500"><p>荒野亂鬥</p></a>
      <a class="card" href="https://lin.ee/z8A1nze" target="_blank"><img src="https://picsum.photos/seed/dunk_final/400/500"><p>全明星街球派對</p></a>
      <a class="card" href="#"><img src="https://picsum.photos/seed/love_final/400/500"><p>戀與深空</p></a>
      <a class="card" href="#"><img src="https://picsum.photos/seed/town_final/400/500"><p>心動小鎮</p></a>
      <a class="card" href="#"><img src="https://picsum.photos/seed/cats_final/400/500"><p>貓咪大戰爭</p></a>
    </div>
  </div>
</div>
</body>
</html>
